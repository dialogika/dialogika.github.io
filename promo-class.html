<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Promo Class | Dialogika</title>

    <link href="assets/img/favicon.webp" rel="icon" />
    <link href="assets/img/apple-touch-icon.webp" rel="apple-touch-icon" />

    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link href="assets/vendor/bootstrap/css/bootstrap.css" rel="stylesheet" />
    <link
      href="assets/vendor/bootstrap-icons/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet" />
    <link href="assets/css/style.css" rel="stylesheet" />
    <style>
      body {
        font-family:
          "Open Sans",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .page-container {
        padding: 60px 15px;
      }

      .table-container {
        border-radius: 20px;
        border: 1px solid rgba(15, 23, 42, 0.06);
        box-shadow: 0 18px 40px -24px rgba(15, 23, 42, 0.4);
        background: #ffffff;
        overflow: hidden;
        margin-top: 20vh;
      }

      .table-header {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: white;
        padding: 24px;
      }

      .table-wrapper {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .promo-table {
        width: 100%;
        min-width: 800px;
        margin-bottom: 0;
        table-layout: auto;
      }

      .promo-table th {
        background-color: #f8fafc;
        font-weight: 600;
        color: #1e293b;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        white-space: nowrap;
      }

      .table-header h1 {
        white-space: nowrap;
      }

      .promo-table td {
        font-size: 14px;
        color: #475569;
        white-space: nowrap;
      }

      .price-normal {
        text-decoration: line-through;
        color: #94a3b8;
      }

      .price-promo {
        font-weight: 700;
        color: #16a34a;
      }

      .badge-location {
        background: #dbeafe;
        color: #1e40af;
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 999px;
      }

      .loading-container {
        text-align: center;
        padding: 60px 20px;
      }

      .spinner-border {
        width: 3rem;
        height: 3rem;
      }
    </style>
  </head>
  <body>
    <!-- ======= Top Bar, Header, Side Bar ======= -->
    <main-header></main-header>
    <!-- ======= Top Bar, Header, Side Bar ======= -->

    <main id="main" class="page-container">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-12">
            <div class="table-container">
              <div class="table-header">
                <h1><i class="bi bi-tags me-2"></i>Daftar Promo Class</h1>
              </div>
              <div class="table-wrapper">
                <div id="loadingContainer" class="loading-container">
                  <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                  </div>
                  <p class="mt-3 text-muted">Memuat data...</p>
                </div>
                <div id="tableContainer" class="d-none">
                  <table
                    id="promoTable"
                    class="table table-striped table-hover promo-table"
                  >
                    <thead>
                      <tr>
                        <th>Produk</th>
                        <th>Lokasi</th>
                        <th>Harga Normal</th>
                        <th>Harga Promo</th>
                        <th>Nama Lokasi</th>
                        <th>Link Google Maps</th>
                      </tr>
                    </thead>
                    <tbody id="promoTableBody"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- ======= Footer ======= -->
    <main-footer></main-footer>
    <footer-modal></footer-modal>
    <!-- ======= End Footer ======= -->

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDyzzEYbJkkl-N8snrQf14qvj8De4YliV0",
        authDomain: "pre-dialogika.firebaseapp.com",
        projectId: "pre-dialogika",
        storageBucket: "pre-dialogika.firebasestorage.app",
        messagingSenderId: "343771410480",
        appId: "1:343771410480:web:32881c9868522090237df5",
        measurementId: "G-SXN811P3N0",
      };

      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      const db = firebase.firestore();

      let allData = [];

      function renderTable(data) {
        const tableBody = document.getElementById("promoTableBody");
        tableBody.innerHTML = "";

        data.forEach((item) => {
          const row = document.createElement("tr");

          const productCell = document.createElement("td");
          productCell.textContent = item.product || "-";
          row.appendChild(productCell);

          const locationCell = document.createElement("td");
          if (item.location) {
            const badge = document.createElement("span");
            badge.className = "badge-location";
            badge.textContent = item.location;
            locationCell.appendChild(badge);
          } else {
            locationCell.textContent = "-";
          }
          row.appendChild(locationCell);

          const normalPriceCell = document.createElement("td");
          normalPriceCell.innerHTML = item.normalPrice
            ? `<span class="price-normal">${item.normalPrice}</span>`
            : "-";
          row.appendChild(normalPriceCell);

          const promoPriceCell = document.createElement("td");
          promoPriceCell.innerHTML = item.promoPrice
            ? `<span class="price-promo">${item.promoPrice}</span>`
            : "-";
          row.appendChild(promoPriceCell);

          const locationNameCell = document.createElement("td");
          locationNameCell.textContent = item.locationName || "-";
          row.appendChild(locationNameCell);

          const mapsLinkCell = document.createElement("td");
          if (item.mapsLink) {
            const link = document.createElement("a");
            link.href = item.mapsLink;
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.className = "btn btn-sm btn-outline-primary";
            link.innerHTML = '<i class="bi bi-geo-alt me-1"></i>Buka Maps';
            mapsLinkCell.appendChild(link);
          } else {
            mapsLinkCell.textContent = "-";
          }
          row.appendChild(mapsLinkCell);

          tableBody.appendChild(row);
        });
      }

      function updateDisplay() {
        // No pagination: show all rows
        renderTable(allData);
      }

      async function loadData() {
        try {
          const snapshot = await db
            .collection("promo_classes")
            .orderBy("location")
            .get();
          allData = snapshot.docs.map((doc) => doc.data());

          document.getElementById("loadingContainer").classList.add("d-none");
          document.getElementById("tableContainer").classList.remove("d-none");

          updateDisplay();
        } catch (error) {
          console.error("Error loading data:", error);
          document.getElementById("loadingContainer").innerHTML = `
          <div class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>
            Terjadi kesalahan saat memuat data. Silakan refresh halaman.
          </div>
        `;
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        loadData();
      });
    </script>

    <script src="assets/js/headerfooter.js"></script>
    <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/glightbox/js/glightbox.min.js"></script>
    <script src="assets/vendor/swiper/swiper-bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
