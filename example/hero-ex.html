<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialogika - Modern Hero Section</title>
    
    <!-- Import Font Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #0b2b6a;
            --light-blue: #0f61a8;
            --purple-shadow: rgba(147, 51, 234, 0.4);
            --purple-ring: rgba(147, 51, 234, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
            overflow-x: hidden;
        }

        /* Hero Container */
        .hero {
            position: relative;
            height: 100vh;
            min-height: 650px;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        /* Background Image - Sesuai posisi favorit Anda */
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://dialogika.co/assets/img/hero.webp');
            background-size: cover;
            background-position: center; /* Posisi yang Anda pilih */
            filter: brightness(1.1) contrast(1.05) saturate(1.1);
            z-index: 1;
        }

        /* Overlay Gradien Halus - Agar wajah tetap terlihat & teks terbaca tajam */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, 
                rgba(255, 255, 255, 0.9) 10%, 
                rgba(255, 255, 255, 0.4) 45%, 
                transparent 100%);
            z-index: 2;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 3;
        }

        /* Membatasi lebar agar tidak menabrak wajah model di tengah/kanan */
        .hero-content {
            max-width: 550px;
        }

        /* Judul Modern */
        .hero-title {
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            font-weight: 800;
            color: var(--primary-blue);
            line-height: 1.1;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .hero-title span {
            color: var(--light-blue);
            display: block;
        }

        /* Subtitle dengan aksen garis */
        .hero-subtitle {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: #444;
            margin-bottom: 35px;
            font-weight: 400;
            line-height: 1.6;
            border-left: 4px solid var(--primary-blue);
            padding-left: 20px;
        }

        /* TOMBOL MODERN: Pill-shaped, Sleek, Interaktif */
        .btn-modern {
            display: inline-block;
            padding: 14px 35px; /* Ukuran Sleek & Profesional */
            font-size: 0.9rem;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 100px; /* Sangat bulat & lembut */
            border: none;
            cursor: pointer;
            
            /* Gradient Awal */
            background: linear-gradient(to bottom, #0f61a8 5%, #0b2b6a 100%);
            
            /* Shadow Ungu */
            box-shadow: 0 8px 20px -5px var(--purple-shadow);
            
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            outline: none;
        }

        .btn-modern:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px -5px var(--purple-shadow);
            filter: brightness(1.1);
        }

        /* EFEK KLIK: Tukar Warna & Ring Shadow */
        .btn-modern:active {
            transform: translateY(1px) scale(0.98);
            
            /* Tukar arah gradient */
            background: linear-gradient(to top, #0f61a8 5%, #0b2b6a 100%);
            
            /* Shadow mengelilingi tombol (seolah tertekan) */
            box-shadow: 0 0 0 5px var(--purple-ring), 
                        inset 0 2px 8px rgba(0,0,0,0.4);
        }

        /* RESPONSIVE DESIGN */

        /* Tablet & Mobile Kecil */
        @media (max-width: 768px) {
            .hero-overlay {
                background: linear-gradient(to bottom, 
                    rgba(255, 255, 255, 0.7) 0%, 
                    rgba(255, 255, 255, 0.95) 50%);
            }
            .hero-content {
                max-width: 100%;
                text-align: center;
                margin-top: 150px;
            }
            .hero-subtitle {
                border-left: none;
                padding-left: 0;
            }
            .btn-modern {
                width: 100%;
            }
        }

        /* Khusus Mobile agar Wajah tidak tertutup */
        @media (max-width: 600px) {
            .hero {
                align-items: flex-end;
                padding-bottom: 50px;
            }
            .hero-bg {
                height: 55%; /* Gambar berada di atas */
                top: 0;
            }
        }
    </style>
</head>
<body>

    <section class="hero">
        <!-- Background tetap center sesuai permintaan Anda -->
        <div class="hero-bg"></div>
        
        <!-- Overlay cerah yang melindungi area teks & membiarkan wajah tetap bening -->
        <div class="hero-overlay"></div>

        <div class="container">
            <div class="hero-content">
                <h1 class="hero-title">
                    Bangun Rasa <br> Percaya Diri <br> <span>Mulai Dari Nol.</span>
                </h1>
                
                <p class="hero-subtitle">
                    Unleash your full potential by mastering the art of public speaking with Dialogika's professional mentoring.
                </p>

                <a href="#" class="btn-modern">Check Program</a>
            </div>
        </div>
    </section>

</body>
</html>
